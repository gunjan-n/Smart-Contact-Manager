<!doctype html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{})}">
  <head>
    <title>LogIn</title>
  </head>
  <body>
    <div id="content">
      <div class="grid grid-cols-12">
        <!-- to center the card, 3 grids before card occupied -->
        <div class="md:col-span-2 lg:col-span-3"></div>
        <!-- takes up 6 grids out of 12 -->
        <div class="col-span-12 md:col-span-8 lg:col-span-6 mt-3">
          <!-- card -->
          <div
            href="#"
            class="bg-gray-50 dark:bg-gray-700 block p-6 border-t-[10px] border-green-700 rounded-xl shadow-xs hover:bg-gray-200 dark:hover:bg-gray-600"
          >
            <h5
              class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8"
            >
              LogIn Here
            </h5>

            <!-- show alert message -->
            <div data-th-replace="~{message::messagebox}"></div>

            <div class="text-red-600 text-center my-3" th:if="${param.error}">Invalid username and password.</div>
            <div class="text-green-600 text-center my-3" th:if="${param.logout}">You have been logged out.</div>

            <!-- form -->
            <form
              data-th-action="@{'/authenticate'}"
              method="post"
              class="mt-5"
            >
              <!-- username field -->
              <div class="mb-3">
                <label
                  for="email"
                  class="block mb-2.5 text-sm font-medium text-heading"
                  >Your email</label
                >
                <input
                  name="email"
                  type="email"
                  id="email"
                  class="bg-gray-50 border border-default-medium text-heading text-sm rounded-lg focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body dark:bg-gray-800 dark:text-white"
                  placeholder="example@email.com"
                  required
                />
                <!-- show errors -->
                <!-- <p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}" class="text-red-500 py-2 px-1"></p> -->
              </div>

              <!-- password field -->
              <div class="mb-3">
                <label
                  for="password"
                  class="block mb-2.5 text-sm font-medium text-heading"
                  >New Password</label
                >
                <input
                  name="password"
                  type="password"
                  id="password"
                  class="bg-gray-50 border border-default-medium text-heading text-sm rounded-lg focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body dark:bg-gray-800 dark:text-white"
                  required
                />
                <!-- show errors -->
                <!-- <p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}" class="text-red-500 py-2 px-1"></p> -->
              </div>

              <!-- buttons -->
              <div class="mb-3 flex justify-center space-x-3">
                <!-- signup button -->
                <button
                  type="submit"
                  class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
                >
                  LogIn
                </button>
                <!-- reset button -->
                <button
                  type="reset"
                  class="text-orange-500 bg-neutral-primary border border-orange-500 hover:bg-orange-500 hover:text-white focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-lg text-sm px-4 py-2.5 focus:outline-none"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

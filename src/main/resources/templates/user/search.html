<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <title>Contacts Page</title>
</head>
<body>
    <div id="content">

        <!-- if user is loggedIn : sidebar -->
        <div data-th-if="${loggedInUser}">
            <div data-th-replace="~{user/sidebar :: sidebar}"></div>
        </div>

        <div class="sm:pl-64 pt-20 m-4">
            <h1 class="text-5xl text-center">Search Results</h1>
            <p data-th-text="${pageContacts.totalElements}+' Results found'"></p>
            <div class="contacts_container mt-3">
                <div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-xl border dark:border-gray-500 dark:bg-gray-700 shadow-xs">
                    <form data-th-object="${contactSearchForm}" data-th-action="@{'/user/contacts/search'}" method="get">
                        <div class="flex items-center justify-start flex-column flex-wrap md:flex-row space-y-4 space-x-4 md:space-y-0 p-4">

                        
                            <div>
                                <select data-th-field="*{field}" name="field" id="countries" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border dark:border-gray-500 text-heading text-sm rounded-xl focus:ring-brand focus:border-brand shadow-xs placeholder:text-body dark:text-white dark:bg-gray-500">
                                    <option selected value="">Search By</option>
                                    <option value="name">Name</option>
                                    <option value="phone">Phone</option>
                                    <option value="email">Email</option>
                                    
                                </select>
                            </div>

                            <div>
                                <label for="input-group-1" class="sr-only">Search</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                                        <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg>
                                    </div>
                                    <input data-th-field="*{keyword}" name="keyword" type="text" id="input-group-1" class="block w-full max-w-96 ps-9 pe-3 py-2 bg-gray-50 border border-default-medium text-heading text-sm rounded-xl focus:ring-brand focus:border-brand shadow-xs dark:bg-gray-500 pl-10 dark:text-white dark:placeholder-white" placeholder="Search">
                                </div>
                            </div>

                            <div>
                                <button
                                type="submit"
                                class="text-blue-500 bg-neutral-primary border border-blue-500 hover:bg-blue-500 hover:text-white focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-lg text-sm px-4 py-2.5 focus:outline-none"
                                >
                                Search
                                </button>
                            </div>
                        </div>
                    </form>
                    <table data-th-unless="${pageContacts.empty}" class="w-full text-sm text-left rtl:text-right text-body">
                        <thead class="text-sm text-body bg-gray-50 border-b border-t border-slate-400">
                            <tr>
                                <th scope="col" class="px-6 py-3 font-medium">
                                    Name
                                </th>
                                <th scope="col" class="px-6 py-3 font-medium">
                                    Phone
                                </th>
                                <th scope="col" class="px-6 py-3 font-medium">
                                    Links
                                </th>
                                <th scope="col" class="px-6 py-3 font-medium">
                                    Action
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr data-th-each="c : ${pageContacts.getContent()}" data-th-object="${c}" class="bg-neutral-primary-soft border-b hover:bg-gray-200 dark:bg-gray-700 rounded-xl shadow-xs dark:hover:bg-gray-600">
                                <th scope="row" class="flex items-center px-6 py-4 text-heading whitespace-nowrap">
                                    <img data-th-src="@{'/images/'' + *{picture}}" onerror="this.src=''" class="w-10 h-10 rounded-full" src="/docs/images/people/profile-picture-1.jpg" alt="Jese image">
                                    <div class="ps-3">
                                        <div data-th-text="*{name}" class="text-base font-semibold">Neil Sims</div>
                                        <div data-th-text="*{email}" class="font-normal text-body">neil.sims@flowbite.com</div>
                                    </div>  
                                </th>
                                <td class="px-6 py-4">
                                    <!-- font awesome icon -->
                                     <i class="fa-solid fa-phone w-4 h-4"></i>
                                    <span data-th-text="*{phoneNumber}"></span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center">
                                        <div data-th-if="*{favorite}" class="h-2.5 w-2.5 rounded-full bg-green-500 me-2"></div> 
                                        <a data-th-href="@{*{websiteLink}}" target="_blank"><i class="fa-solid fa-link w-8 h-8"></i></a>
                                        <a data-th-href="@{*{linkedInLink}}" target="_blank"><i class="fa-brands fa-linkedin w-8 h-8"></i></a>

                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <!-- <a href="#" class="font-medium text-fg-brand hover:underline">Edit user</a> -->
                                    <div>
                                        <!-- delete contact -->
                                        <button data-th-onclick="deleteContact([[${c.id}]])"><i class="fa-solid fa-trash w-6 h-6"></i></button>
                                        <!-- update contact -->
                                        <a href=""><i class="fa-solid fa-pen w-6 h-6"></i></a>
                                        <!-- view contact -->
                                        <button data-th-onclick="loadContactData([[${c.id}]])"><i class="fa-solid fa-eye w-6 h-6"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- pagination -->
                    <nav data-th-unless="${pageContacts.empty}" class="flex items-center flex-column flex-wrap md:flex-row justify-between p-4" aria-label="Table navigation">
                        <ul class="flex -space-x-px text-sm">
                            <li data-th-unless="${pageContacts.first}">
                                <a data-th-href="@{'/user/contacts/search?page='+${pageContacts.number-1}+'&field='+${contactSearchForm.field}+'&keyword='+${contactSearchForm.keyword}}" class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-s-base text-sm px-3 h-9 focus:outline-none">Previous</a>
                            </li>
                            <li data-th-each="index : ${#numbers.sequence(0, pageContacts.totalPages-1)}" data-th-classappend="${index==pageContacts.number} ? 'bg-blue-600 text-white dark:bg-gray-600' : 'bg-gray-50 text-body dark:bg-gray-800'" >
                                <a data-th-href="@{'/user/contacts/search?page='+${index}+'&field='+${contactSearchForm.field}+'&keyword='+${contactSearchForm.keyword}}" class="flex items-center justify-center box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium text-sm w-9 h-9 focus:outline-none dark:text-white"><span data-th-text="${index+1}"></span></a>
                            </li>
                            <li data-th-unless="${pageContacts.last}">
                                <a data-th-href="@{'/user/contacts/search?page='+${pageContacts.number+1}+'&field='+${contactSearchForm.field}+'&keyword='+${contactSearchForm.keyword}}" class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-e-base text-sm px-3 h-9 focus:outline-none">Next</a>
                            </li>
                        </ul>
                    </nav>

                    <h1 data-th-if="${pageContacts.empty}" class="text-3xl p-4 text-center">No Result Found</h1>
                </div>
            </div>

            <div data-th-replace="~{user/contact_modals :: singleContact}"></div>

        </div>
    </div>

    <script data-th-src="@{'/js/contacts.js'}"></script>
    <script>
        console.log("INLINE SCRIPT WORKING");
    </script>
</body>
</html>
